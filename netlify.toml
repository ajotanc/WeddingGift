# Configuration for Netlify Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), camera=(), microphone=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; connect-src 'self' http://localhost:8090 https://api.emailjs.com https://generativelanguage.googleapis.com https://*.trycloudflare.com; img-src 'self' data: blob: https://*; frame-src 'self' https://www.youtube-nocookie.com; style-src 'self' 'unsafe-inline';"
